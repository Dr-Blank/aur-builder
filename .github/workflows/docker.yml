name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            /tmp/aur-cache/pacman
            /tmp/aur-cache/aurutils
            /tmp/aur-cache/go-build
          key: aur-build-cache-${{ runner.os }}-yay-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            aur-build-cache-${{ runner.os }}-yay-
            aur-build-cache-${{ runner.os }}-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: aur-builder:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare cache and output dirs
        run: |
          mkdir -p /tmp/aur-cache/pacman /tmp/aur-cache/aurutils /tmp/aur-cache/go-build /tmp/repo
          sudo chown -R 1000:1000 /tmp/aur-cache /tmp/repo

      - name: Build yay (one-shot, no chroot)
        run: |
          docker run --rm \
            -v /tmp/repo:/repo \
            -v /tmp/aur-cache/pacman:/var/cache/pacman/pkg \
            -v /tmp/aur-cache/aurutils:/home/builder/.cache/aurutils \
            -v /tmp/aur-cache/go-build:/home/builder/.cache/go-build \
            -e PACKAGES=yay \
            -e USE_CHROOT=0 \
            -e CRON="" \
            aur-builder:ci

      - name: Verify yay package was built
        run: |
          echo "=== Built packages ==="
          ls -lh /tmp/repo/*.pkg.tar.zst
          ls /tmp/repo/yay-*.pkg.tar.zst

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
