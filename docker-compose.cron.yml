# Overlay: run aur-builder on a schedule using ofelia
# https://github.com/mcuadros/ofelia
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.cron.yml up -d
#
# ofelia reads job config from container labels on aur-builder.
# Adjust the schedule below (cron syntax or @every <duration>).

services:
  scheduler:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      - aur-builder
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker

  aur-builder:
    restart: "no"   # ofelia starts it; don't auto-restart between runs
    labels:
      ofelia.enabled: "true"
      # Re-run the aur-builder container every 6 hours
      ofelia.job-run.build-aur.schedule: "@every 6h"
      ofelia.job-run.build-aur.container: "aur-builder"
