services:
  aur-builder:
    image: ghcr.io/dr-blank/aur-builder:latest
    # Required: systemd-nspawn (devtools clean chroot) needs elevated privileges
    privileged: true
    restart: unless-stopped

    volumes:
      # Output: pacman repository (packages + db files land here)
      - ./repo:/repo

      # Input: package list (one name per line, # comments supported)
      - ./packages.txt:/packages.txt:ro

      # Optional: persist build chroot across runs (speeds up subsequent builds)
      # - aur-chroot:/var/lib/aurbuild

    environment:
      # Cron schedule(s) for automatic builds. Use | to separate multiple schedules.
      # Leave empty to run once and exit (one-shot mode).
      # Examples:
      #   CRON: "0 2 * * *"                  # daily at 2 AM
      #   CRON: "0 2 * * *|0 14 * * *"       # 2 AM and 2 PM
      CRON: "0 2 * * *"

      # Set to 1 to run a build immediately on container start before the cron schedule takes over.
      RUN_ON_START: "1"

      # Space-separated package names - merged with packages.txt at runtime
      PACKAGES: ""

      # Set to 0 to skip clean chroot - fast builds for local testing (no systemd-nspawn)
      # Set to 1 (default) for reproducible clean chroot builds via devtools
      USE_CHROOT: "1"

      # Overrides (optional):
      # MAKEFLAGS: "-j4"         # default: -j$(nproc) - all available cores
      # SKIP_PGP_CHECK: "1"      # skip GPG signature checks (fallback if keyserver unreachable)

# volumes:
#   aur-chroot:
